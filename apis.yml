  - Direct Debits
  - Scheduled Payments
  - Banking
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.auswidebank.com.au/help/banking-support/open-banking/
  baseURL: https://api.auswidebank.com.au/openbanking/cds-au/v1/banking/accounts/direct-debits
  properties:
  - url: https://www.auswidebank.com.au/help/banking-support/open-banking/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-apis
    type: APIReference
  - url: openapi/auswide-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right direct debits and scheduled
    payments surface exposing GET /banking/accounts/{accountId}/direct-debits, the
    bulk GET /banking/accounts/direct-debits, GET /banking/accounts/{accountId}/payments/scheduled,
    and the bulk GET /banking/payments/scheduled. These endpoints disclose authorised
    direct debit arrangements and future-dated scheduled payments for consented
    accounts, and require an active CDR consumer consent through an accredited data
    recipient over the MTLS/FAPI-secured CDR channel. Defined by the shared DSB
    Consumer Data Standards CDR Banking API v1.36.0.
- aid: auswide-bank:auswide-bank-cdr-payees-api
  name: Auswide Bank CDR Payees API
  tags:
  - CDR
  - Open Banking
  - Payees
  - Banking
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.auswidebank.com.au/help/banking-support/open-banking/
  baseURL: https://api.auswidebank.com.au/openbanking/cds-au/v1/banking/payees
