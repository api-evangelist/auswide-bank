name: Auswide Bank
kind: company
description: Auswide Bank Ltd is an Australian authorised deposit-taking institution
  (ADI) headquartered in Bundaberg, Queensland, offering home loans, savings and
  transaction accounts, term deposits, credit cards, and personal and business banking.
  Formerly Wide Bay Australia and previously ASX-listed (ABA), Auswide is now a
  division of MyState Bank Limited, a wholly owned subsidiary of the ASX-listed
  MyState Limited (ASX MYS) following the 2025 merger. As an active CDR data holder
  under Australia's Consumer Data Right (Open Banking), Auswide exposes a public,
  unauthenticated Product Reference Data (PRD) API conforming to the DSB Consumer
  Data Standards, alongside the accredited-data-recipient consumer data sharing
  channels required of every Australian bank.
