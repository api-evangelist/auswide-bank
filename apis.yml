  - url: https://www.auswidebank.com.au/help/banking-support/open-banking/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-apis
    type: APIReference
  - url: openapi/auswide-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right payees surface exposing GET
    /banking/payees and GET /banking/payees/{payeeId} (payee detail). These endpoints
    return the saved payee list a consumer has consented to share, covering domestic,
    international, and BPAY payee details, and require an active CDR consumer consent
    through an accredited data recipient over the MTLS/FAPI-secured CDR channel.
    Auswide Bank implements them as a mandatory ADI data holder obligation. Defined
    by the shared DSB Consumer Data Standards CDR Banking API v1.36.0.
